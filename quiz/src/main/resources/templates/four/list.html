<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>4択問題一覧</title>
</head>
<body>

<h1>4択問題一覧</h1>

<!-- 新規作成画面へ -->
<a th:href="@{/four/create}">新規登録</a>
&nbsp;
<a th:href="@{/csv}">CSVアップロード</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>問題文</th>
        <th>正解</th>
        <th>編集</th>
        <th>削除</th>
    </tr>

    <!-- Controllerから渡されたlistをループ -->
    <tr th:each="q : ${list}">
        <td th:text="${q.id}"></td>
        <td th:text="${q.question}"></td>
        <td th:text="${q.answer}"></td>

        <!-- 編集 -->
        <td>
            <a th:href="@{/four/edit/{id}(id=${q.id})}">編集</a>
        </td>

        <!-- 削除 -->
        <td>
            <form th:action="@{/four/delete/{id}(id=${q.id})}" method="post">
                <button type="submit">削除</button>
            </form>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/}">トップへ戻る</a>

</body>
</html>
