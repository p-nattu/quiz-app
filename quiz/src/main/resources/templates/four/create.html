<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>4択問題作成</title>
</head>
<body>

<h1>4択問題作成</h1>

<form th:action="@{/four/save}" th:object="${fourQuestionForm}" method="post">

    <div>
        問題文：<input type="text" th:field="*{question}">
    </div>

    <div>
        選択肢1：<input type="text" th:field="*{choice1}">
    </div>

    <div>
        選択肢2：<input type="text" th:field="*{choice2}">
    </div>

    <div>
        選択肢3：<input type="text" th:field="*{choice3}">
    </div>

    <div>
        選択肢4：<input type="text" th:field="*{choice4}">
    </div>

    <div>
        正解番号：<input type="number" th:field="*{answer}" min="1" max="4">
    </div>

    <button type="submit">登録</button>

</form>

<br>
<a th:href="@{/four/list}">一覧へ戻る</a>

</body>
</html>
